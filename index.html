<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main role="main">
    <section data-testid="test-todo-card" class="todo-card" role="region" aria-labelledby="todo-title">
      <div class="card-header">
        <h2 id="todo-title" data-testid="test-todo-title" class="todo-title">HNG Stage 0 Task</h2>
        <span data-testid="test-todo-priority" class="priority-badge" aria-label="Priority: High">High</span>
      </div>
      <p data-testid="test-todo-description" class="todo-description">Build a fully functional Todo card component with all required accessibility, responsiveness, and interactivity.</p>
      <div class="due-section">
        <time data-testid="test-todo-due-date" class="due-date" datetime="2026-04-16T18:00:00Z">Due April 16 2026</time>
        <span data-testid="test-todo-time-remaining" class="time-remaining" aria-live="polite">Calculating...</span>
      </div>
      <div class="status-section">
        <label class="status-label">
          <input data-testid="test-todo-complete-toggle" type="checkbox" id="complete-toggle" aria-describedby="status-text">
          <span id="status-text" data-testid="test-todo-status" class="status-badge">Pending</span>
        </label>
      </div>
      <ul data-testid="test-todo-tags" class="tags-list" role="list">
        <li data-testid="test-todo-tag-work" class="tag">work</li>
        <li data-testid="test-todo-tag-urgent" class="tag">urgent</li>
      </ul>
      <div class="actions">
        <button data-testid="test-todo-edit-button" class="btn btn-edit" aria-label="Edit todo">Edit</button>
        <button data-testid="test-todo-delete-button" class="btn btn-delete" aria-label="Delete todo">Delete</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
