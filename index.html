<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main role="main">
<section data-testid="test-todo-card" class="todo-card" role="region" aria-labelledby="todo-title">
      <div data-testid="test-todo-view-content">
        <div class="card-header">
          <h2 id="todo-title" data-testid="test-todo-title" class="todo-title">HNG Stage 1 Task</h2>
          <span data-testid="test-todo-priority" class="priority-badge" aria-label="Priority: High">High</span>
        </div>
        <button data-testid="test-toggle-details" id="toggle-details-btn" class="btn btn-toggle-details" aria-expanded="false" aria-controls="todo-description-section" aria-label="Toggle description">
          Description <span aria-hidden="true" class="toggle-icon">▼</span>
        </button>
        <div id="todo-description-section" class="details-section" hidden>
          <p data-testid="test-todo-description" class="todo-description">Extention of Stage 0 Todo Card into a more interactive, stateful, and slightly more “app-like” component.</p>
        </div>
        <div class="due-section">
          <time data-testid="test-todo-due-date" class="due-date" datetime="2026-04-17T23:59:00Z">Due April 17 2026</time>
          <span data-testid="test-todo-overdue-indicator" class="overdue-indicator" aria-hidden="true"></span>
          <span data-testid="test-todo-time-remaining" class="time-remaining" aria-live="polite">Calculating...</span>
        </div>
<div class="status-section">
          <label class="status-label">
            <input data-testid="test-todo-complete-toggle" type="checkbox" id="complete-toggle" aria-describedby="status-text">
            <span id="status-text" data-testid="test-todo-status" class="status-badge">Pending</span>
          </label>
          <select data-testid="test-todo-status-control" aria-label="Todo status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <ul data-testid="test-todo-tags" class="tags-list" role="list">
          <li data-testid="test-todo-tag-work" class="tag">work</li>
          <li data-testid="test-todo-tag-urgent" class="tag">urgent</li>
        </ul>
        <div class="actions">
          <button data-testid="test-todo-edit-button" class="btn btn-edit" aria-label="Edit todo">Edit</button>
          <button data-testid="test-todo-delete-button" class="btn btn-delete" aria-label="Delete todo">Delete</button>
        </div>
      </div>
      </div>
      
    </section>
  </main>
  
  <!-- Edit Modal -->
  <div id="modal-backdrop" class="backdrop hidden"></div>
  <div id="edit-modal" class="modal hidden" data-testid="test-todo-edit-form" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Edit Todo</h3>
      <button class="modal-close" aria-label="Close modal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="edit-field">
        <label for="edit-title">Title</label>
        <input id="edit-title" data-testid="test-todo-edit-title-input" type="text" value="HNG Stage 0 Task">
      </div>
      <div class="edit-field">
        <label for="edit-desc">Description</label>
        <textarea id="edit-desc" data-testid="test-todo-edit-description-input" rows="3">Build a fully functional Todo card component with all required accessibility, responsiveness, and interactivity.</textarea>
      </div>
      <div class="edit-field-group">
        <div>
          <label for="edit-priority">Priority</label>
          <select id="edit-priority" data-testid="test-todo-edit-priority-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High" selected>High</option>
          </select>
        </div>
        <div>
          <label for="edit-due-date">Due Date</label>
          <input id="edit-due-date" data-testid="test-todo-edit-due-date-input" type="datetime-local" value="2026-04-16T11:00">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button data-testid="test-todo-save-button" class="btn btn-save" type="button">Save</button>
      <button data-testid="test-todo-cancel-button" class="btn btn-cancel" type="button">Cancel</button>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
